$kind: http-request
method: POST
url: '{{base_url}}/api/appointments/'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "serviceId": "{{service_id}}",
      "appointmentDate": "2026-06-15",
      "appointmentTime": "10:00 AM",
      "customerNotes": "Please check the brakes too"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201 Created", function () {
        pm.response.to.have.status(201);
      });

      pm.test("Response contains appointment fields", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("_id").that.is.a("string");
        pm.expect(json).to.have.property("userId");
        pm.expect(json).to.have.property("serviceId");
        pm.expect(json).to.have.property("appointmentDate");
        pm.expect(json).to.have.property("appointmentTime");
        pm.expect(json).to.have.property("status", "Scheduled");
      });

      pm.test("Status defaults to Scheduled", function () {
        const json = pm.response.json();
        pm.expect(json.status).to.equal("Scheduled");
      });

      // Save appointment ID for later requests
      if (pm.response.code === 201) {
        const json = pm.response.json();
        pm.collectionVariables.set("appointment_id", json._id);
      }

      pm.test("Response time is under 1000ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(1000);
      });
