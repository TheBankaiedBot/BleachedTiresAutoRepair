$kind: http-request
method: PATCH
url: '{{base_url}}/api/appointments/{{appointment_id}}'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Appointment status is now Cancelled", function () {
        const json = pm.response.json();
        pm.expect(json.status).to.equal("Cancelled");
      });

      pm.test("Response contains appointment ID", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("_id");
      });

      pm.test("Response time is under 1000ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(1000);
      });
