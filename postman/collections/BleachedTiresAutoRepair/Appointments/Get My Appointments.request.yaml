$kind: http-request
method: GET
url: '{{base_url}}/api/appointments/me'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response is an array", function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an("array");
      });

      pm.test("Each appointment belongs to the current user", function () {
        const json = pm.response.json();
        json.forEach(function(appt) {
          pm.expect(appt).to.have.property("userId");
          pm.expect(appt).to.have.property("status");
          pm.expect(["Scheduled", "Completed", "Cancelled"]).to.include(appt.status);
        });
      });

      pm.test("Response time is under 1000ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(1000);
      });
