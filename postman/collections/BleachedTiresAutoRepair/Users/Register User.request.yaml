$kind: http-request
method: POST
url: '{{base_url}}/api/users/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "Jane",
      "lastName": "Doe",
      "email": "jane.doe@example.com",
      "password": "SecurePass1",
      "phone": "555-867-5309",
      "zipcode": "90210"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201 Created", function () {
        pm.response.to.have.status(201);
      });

      pm.test("Response contains user fields", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("id");
        pm.expect(json).to.have.property("firstName", "Jane");
        pm.expect(json).to.have.property("lastName", "Doe");
        pm.expect(json).to.have.property("email", "jane.doe@example.com");
        pm.expect(json).to.have.property("phone", "555-867-5309");
        pm.expect(json).to.have.property("zipcode", "90210");
      });

      pm.test("Password is NOT returned in response", function () {
        const json = pm.response.json();
        pm.expect(json).to.not.have.property("password");
      });

      pm.test("Response time is under 1000ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(1000);
      });
